# VERSIÓN: 3.0 (NicePod Sovereign Type Sync - Industrial Grade)
# [MEJORAS]: Build Shield, Inyección de Secretos, Validación de Esquema y Error Handling.

name: "Sincronía de Metal: Generación de Tipos"

on:
  workflow_dispatch: # Ejecución manual (Control del Administrador)
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**' # Sincronía al cambiar el Metal físico

jobs:
  update-types:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout: Adquiriendo código fuente"
        uses: actions/checkout@v4

      - name: "Entorno: Configurando Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: "CLI: Instalando Supabase"
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: "Generación: Introspección del Cloud"
        # Usamos el Project ID como variable de entorno para mayor limpieza
        # Forzamos el esquema 'public' para evitar ruidos de otros esquemas
        run: |
          supabase gen types typescript --project-id ${{ secrets.SUPABASE_PROJECT_ID }} --schema public > types/database.types.ts
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: "Build Shield: Verificando Integridad de la Malla"
        # Este paso es VITAL. Si los nuevos tipos rompen el código (ej. por un cambio de nombre), 
        # la acción se detiene y no hace commit.
        run: |
          npm install --no-package-lock
          npx tsc --noEmit --project tsconfig.json

      - name: "Commit: Sellado de Integridad Nominal"
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: 🏛️ automated sync of database types [V3.0][skip ci]"
          file_pattern: 'types/database.types.ts'
          commit_user_name: "NicePod Architect Bot"
          commit_user_email: "bot@nicepod.io"