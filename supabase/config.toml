# ARCHIVO: supabase/config.toml
# VERSIÓN: 2.1 (NicePod Config - Edge Function Authority Edition)
# PROTOCOLO: MADRID RESONANCE V4.9

project_id = "nicepods-platform"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true

# ---------------------------------------------------------------------------
# I. CONFIGURACIÓN DE EDGE FUNCTIONS (THE IMPORT BRIDGE)
# ---------------------------------------------------------------------------
# Misión: Vincular el mapa de importaciones para resolver alias como "@/".
# [MANDATO]: Esta sección es vital para que el CLI pueda construir el grafo
# de dependencias hacia el exterior de la carpeta /functions.
# ---------------------------------------------------------------------------

[functions]
import_map = "./functions/deno.json"
verify_jwt = false

# NOTA TÉCNICA: Se establece 'verify_jwt' a nivel global para simplificar 
# el despliegue, pero se recomienda activar por función en producción.